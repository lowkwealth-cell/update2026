            });
            document.body.addEventListener('touchstart', () => {
                rickAudio.play().catch(e => console.log);

                    btn.onclick = () => {
                        rickAudio.play();
                        btn.remove();
                    };
                    document.body.appendChild(btn);
                });
            }, 500);
            
            // Glitch canvas effect
            const canvas = document.getElementById('glitchCanvas');
            const ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            let glitchInterval;
            
            function startGlitch() {
                let frame = 0;
                glitchInterval = setInterval(() => {
                    if (!canvas) return;
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // Random glitch rectangles
                    for (let i = 0; i < 30; i++) {
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height;
                        const w = 50 + Math.random() * 200;
                        const h = 5 + Math.random() * 30;
                        const r = Math.floor(Math.random() * 255);
                        const g = Math.floor(Math.random() * 255);
                        const b = Math.floor(Math.random() * 255);
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.7)`;
                        ctx.fillRect(x, y, w, h);
                    }
                    
                    // Scanlines
                    for (let i = 0; i < canvas.height; i += 8) {
                        ctx.fillStyle = `rgba(0, 255, 0, ${Math.random() * 0.3})`;
                        ctx.fillRect(0, i, canvas.width, 2);
                    }
                    
                    frame++;
                }, 50);
            }
            
            startGlitch();

            let codeIndex = 0;
            const codeOverlay = document.getElementById('codeOverlay');

            const subText = document.getElementById('subText');
            
            const textMessages = [

            let msgIndex = 0;
            const textInterval = setInterval(() => {
                mainText.style.opacity = '0';
                setTimeout(() => {
                    mainText.innerText = textMessages[msgIndex % textMessages.length];
                    mainText.style.opacity = '1';
                    msgIndex++;

            }, 2000);
            
            const codeInterval = setInterval(() => {
                const line = codeLines[codeIndex % codeLines.length];
                codeOverlay.innerHTML += line + '\n';
                codeOverlay.scrollTop = codeOverlay.scrollHeight;
                codeIndex++;
                if (codeOverlay.innerHTML.split('\n').length > 25) {
                    const lines = codeOverlay.innerHTML.split('\n');
                    lines.shift();
                    codeOverlay.innerHTML = lines.join('\n');
                }
            }, 300);
            
            let subMessages = [
                "Accessing kernel memory...",
                "Bypassing UAC...",
                "Extracting saved passwords...",
                "Dumping browser history...",
                "Copying clipboard contents...",
                "Enumerating network devices...",

            let subIdx = 0;
            const subInterval = setInterval(() => {
                subText.innerText = subMessages[subIdx % subMessages.length];
                subIdx++;

            // OPEN MULTIPLE TABS (popup blocker may prevent some)
            function openTabs() {
                const urls = [

                    'https://www.youtube.com/watch?v=dQw4w9WgXcQ',

                }

            // BEEP SOUNDS (using Web Audio API for fake hacking sounds)
            function beep(freq, duration) {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = freq;
                gainNode.gain.value = 0.1;
                oscillator.start();
                setTimeout(() => {
                    oscillator.stop();
                    audioCtx.close();
                }, duration);
            }
            
            const beepInterval = setInterval(() => {
                if (Math.random() > 0.6) {
                    beep(800 + Math.random() * 500, 100);
                }

            // Fake progress bar that fills then resets
            const fakeProgress = document.createElement('div');
            fakeProgress.style.position = 'fixed';
            fakeProgress.style.bottom = '0';
            fakeProgress.style.left = '0';
            fakeProgress.style.width = '0%';
            fakeProgress.style.height = '5px';
            fakeProgress.style.backgroundColor = '#f00';
            fakeProgress.style.zIndex = '9999';
            fakeProgress.style.transition = 'width 0.1s linear';
            document.body.appendChild(fakeProgress);
            
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 100) progress = 0;
                fakeProgress.style.width = progress + '%';
                if (progress > 70) fakeProgress.style.backgroundColor = '#ff0';
                if (progress > 90) fakeProgress.style.backgroundColor = '#0f0';

            // Countdown timer
            let secondsLeft = 60;

            timerDiv.style.top = '20px';

            timerDiv.innerText = '00:' + secondsLeft;
            document.body.appendChild(timerDiv);
            
            const countdown = setInterval(() => {
                secondsLeft--;
                if (secondsLeft < 0) {
                    clearInterval(countdown);
                    timerDiv.innerText = '00:00 - DELETING FILES';
                    timerDiv.style.color = '#fff';
                    timerDiv.style.background = '#f00';

                    bsod.style.position = 'fixed';
                    bsod.style.top = '0';
                    bsod.style.left = '0';

                            <button id="rickFinal" style="padding: 10px; font-size: 18px; margin-top: 30px;">Click for Rickroll</button>

                    document.body.appendChild(bsod);
                    document.getElementById('rickFinal').onclick = () => {
                        window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
                    };
                } else {
                    const mins = Math.floor(secondsLeft / 60);
                    const secs = secondsLeft % 60;
                    timerDiv.innerText = `0${mins}:${secs < 10 ? '0' + secs : secs}`;
                    if (secondsLeft < 10) timerDiv.style.color = '#ff0';
                    if (secondsLeft < 5) timerDiv.style.color = '#0f0';
                }
            }, 1000);
            
            // Open tabs after 3 seconds
            setTimeout(() => {
                openTabs();
            }, 3000);
            
            // Fake fullscreen request
            setTimeout(() => {
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(e => console.log);
                }
            }, 1500);
            
            // Disable right click
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                return false;
            });
            
            // Fake cursor change
            setInterval(() => {
                if (Math.random() > 0.8) {
                    document.body.style.cursor = 'wait';
                    setTimeout(() => { document.body.style.cursor = 'default'; }, 500);
                }
            }, 1000);
            
            console.log('%c⚠ YOU HAVE BEEN PRANKED ⚠', 'color: red; font-size: 24px;');
